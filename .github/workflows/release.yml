name: Release DMG

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release:
    runs-on: macos-14  # Apple Silicon runner
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            spotti-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('spotti-core/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Build DMG
        run: |
          chmod +x scripts/build-dmg.sh scripts/build-rust.sh
          scripts/build-dmg.sh --skip-sign --skip-notarize

      - name: Extract version from tag
        id: version
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: Spotti ${{ steps.version.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: build/Spotti-${{ steps.version.outputs.version }}.dmg
